syntax = "proto3";

package stats.v1;

option go_package = "github.com/aesterial/secureguard/internal/api/v1/stats/v1;stats";

import "google/protobuf/timestamp.proto";

enum Fields {
    FIELDS_UNSPECIFIED = 0;
    FIELDS_ALL = 1;
    FIELDS_USERS = 2;
    FIELDS_PASSWORDS = 3;
    FIELDS_CRYPT = 4;
}

message ByDateRequest {
    google.protobuf.Timestamp day = 2;
}

message TotalResponse {
  int32 users = 1;
  int32 admins = 2;
  int32 passwords = 3;
  int32 active_sessions = 4;
}

message GraphPoint {
  google.protobuf.Timestamp time = 1;
  int32 value = 2;
}

message Latency {
  double p50 = 1;
  double p90 = 2;
}

message StatsResponse {
    map<string, int32> top_services = 1;
    repeated GraphPoint activity_graph = 3;
    repeated GraphPoint register_graph = 2;
    map<string, int32> crypt = 4;
    Latency latency = 5;
}

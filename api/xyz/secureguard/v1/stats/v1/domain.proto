syntax = "proto3";

package xyz.secureguard.v1.stats.v1;

option go_package = "github.com/aesterial/secureguard/internal/api/v1/stats/v1;stats";

import "google/protobuf/timestamp.proto";

message ByDateRequest {
  google.protobuf.Timestamp day = 2;
}

message TotalResponse {
  int32 users = 1;
  int32 admins = 2;
  int32 passwords = 3;
  int32 active_sessions = 4;
}

message GraphPoint {
  google.protobuf.Timestamp time = 1;
  int32 value = 2;
}

message Latency {
  double p50 = 1;
  double p90 = 2;
}

message Stats {
  map<string, int32> top_services = 1;
  repeated GraphPoint users_graph = 3;
  repeated GraphPoint register_graph = 2;
  map<string, int32> crypt_uses = 4;
  map<string, int32> theme_uses = 5;
  map<string, int32> lang_uses = 6;
  Latency latency = 7;
}

message StatsResponse {
  Stats stats = 1;
}

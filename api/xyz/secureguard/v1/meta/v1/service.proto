syntax="proto3";

package xyz.secureguard.api.v1.meta.v1;

option go_package = "github.com/aesterial/secureguard/internal/api/v1/meta/v1;meta";

import "google/protobuf/empty.proto";
import "xyz/secureguard/v1/meta/v1/domain.proto";

service MetaService {
  rpc ServerInformation(google.protobuf.Empty) returns (ServerInfoResponse);
  rpc ClientCompatibility(CompatibilityRequest) returns (CompatibilityResponse);
  rpc Localisation(google.protobuf.Empty) returns (LocalisationResponse);
}

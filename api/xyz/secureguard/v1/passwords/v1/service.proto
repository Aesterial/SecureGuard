syntax = "proto3";

package xyz.secureguard.v1.passwords.v1;

import "xyz/secureguard/v1/passwords/v1/domain.proto";
import "xyz/secureguard/v1/types.proto";

option go_package = "github.com/aesterial/secureguard/internal/api/v1/passwords/v1;passwords";

service PasswordService {
  rpc List(xyz.secureguard.v1.RequestWithLimitAndOffset) returns (ListResponse);
  rpc Create(CreateRequest) returns (PassDataResponse);
  rpc Update(UpdateRequest) returns (PassDataResponse);
  rpc Delete(xyz.secureguard.v1.RequestWithID) returns (DeleteResponse);
}

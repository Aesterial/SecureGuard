syntax = "proto3";

package xyz.secureguard.v1;

option go_package = "github.com/aesterial/secureguard/internal/api/v1";

message RequestWithID {
  string id = 1;
};

message RequestWithIdAndValue {
  string id = 1;
  string value = 2;
};

message RequestWithValue {
  string value = 1;
}

message RequestWithLimit {
  int32 limit = 1;
}

message RequestWithOffset {
  int32 offset = 1;
}

message RequestWithLimitAndOffset {
  int32 limit = 1;
  int32 offset = 2;
}

message RequestWithBoolean {
  bool value = 1;
}

message RequestWithBooleanLimitOffset {
  bool value = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message Kdf {
  int32 version = 1;
  int64 memory = 2;
  int32 iterations = 3;
  int32 parallelism = 4;
}

message RequestWithValueAndKdf {
  Kdf kdf = 1;
  string value = 2;
}

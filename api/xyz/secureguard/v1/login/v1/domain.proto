syntax = "proto3";

package xyz.secureguard.v1.login.v1;

option go_package = "github.com/aesterial/secureguard/internal/api/v1/login/v1;login";

import "xyz/secureguard/v1/users/v1/domain.proto";
import "xyz/secureguard/v1/types.proto";

message AuthorizeRequest {
  string username = 1;
  string password = 2;
  string master_key = 3;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string master_key = 3;
  string salt = 4;
  xyz.secureguard.v1.Kdf    kdf_params = 5;
}

message LoginResponse {
  xyz.secureguard.v1.users.v1.UserSelf info = 1;
  string session = 2;
}

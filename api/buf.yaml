version: v2

modules:
  - path: .
    excludes:
      - third_party/googleapis
      - third_party/grpc-web
  - path: third_party/googleapis
  - path: third_party/grpc-web

lint:
  use:
    - STANDARD
  ignore:
    - third_party/googleapis
    - third_party/grpc-web
  except:
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME

breaking:
  use:
    - FILE

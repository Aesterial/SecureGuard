version: v2

inputs:
  - directory: .
    paths:
      - xyz/secureguard/v1

plugins:
  - local: protoc-gen-go
    out: ../server/internal
    opt:
      - module=github.com/aesterial/secureguard/internal
  - local: protoc-gen-go-grpc
    out: ../server/internal
    opt:
      - module=github.com/aesterial/secureguard/internal
      - require_unimplemented_servers=false
  - local: protoc-gen-prost
    out: ../client/grpc
  - local: protoc-gen-tonic
    out: ../client/grpc

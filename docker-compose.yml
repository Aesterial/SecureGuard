services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_NAME:-secureguard}
    volumes:
      - secureguard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_NAME: ${POSTGRES_NAME:-secureguard}
      POSTGRES_TLS: ${POSTGRES_TLS:-false}
      BOOT_PORT: ${BOOT_PORT:-50051}
      LOG_SERVICE: ${LOG_SERVICE:-secureguard}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      DEBUG_MODE: ${DEBUG_MODE:-false}
    expose:
      - "${BOOT_PORT:-50051}"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BOOT_PORT: ${BOOT_PORT:-50051}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  secureguard-postgres-data:
  caddy-data:
  caddy-config:

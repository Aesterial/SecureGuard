services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_NAME:-secureguard}
    volumes:
      - secureguard-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - secureguard-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.9.1
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MDEyMzQ1Njc4OWFiY2RlZg
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - secureguard-kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20

  backend:
    image: aesterial/secureguard:1.1
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        COMMIT_HASH: ${COMMIT_HASH:-dev}
        BUILD_TIME: ${BUILD_TIME:-1970-01-01T00:00:00Z}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_HOST: ${DOCKER_POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_NAME: ${POSTGRES_NAME:-secureguard}
      POSTGRES_TLS: ${POSTGRES_TLS:-false}
      POSTGRES_TLS_MODE: ${DOCKER_POSTGRES_TLS_MODE:-disable}
      BOOT_PORT: ${BOOT_PORT:-50051}
      LOG_SERVICE: ${LOG_SERVICE:-secureguard}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVER_NAME: ${SERVER_NAME:-SecureGuard Server}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      KAFKA_BROKERS: ${DOCKER_KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-secureguard.logs}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-secureguard-backend}
      REDIS_ADDR: ${DOCKER_REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_PREFIX: ${RATE_LIMIT_PREFIX:-secureguard:ratelimit}
      RATE_LIMIT_AUTHORIZE_LIMIT: ${RATE_LIMIT_AUTHORIZE_LIMIT:-20}
      RATE_LIMIT_AUTHORIZE_WINDOW_SEC: ${RATE_LIMIT_AUTHORIZE_WINDOW_SEC:-900}
      RATE_LIMIT_REGISTER_LIMIT: ${RATE_LIMIT_REGISTER_LIMIT:-5}
      RATE_LIMIT_REGISTER_WINDOW_SEC: ${RATE_LIMIT_REGISTER_WINDOW_SEC:-3600}
      RATE_LIMIT_META_LIMIT: ${RATE_LIMIT_META_LIMIT:-60}
      RATE_LIMIT_META_WINDOW_SEC: ${RATE_LIMIT_META_WINDOW_SEC:-60}
      DEBUG_MODE: ${DEBUG_MODE:-false}
    expose:
      - "${BOOT_PORT:-50051}"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BOOT_PORT: ${BOOT_PORT:-50051}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  secureguard-postgres-data:
  secureguard-redis-data:
  secureguard-kafka-data:
  caddy-data:
  caddy-config:

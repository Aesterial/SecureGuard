name: Go Link + Static Analysis

on:
  pull_request:
    paths:
      - "server/internal/**"
      - "server/starter/**"
      - ".github/workflows/go-link-static.yml"
  push:
    branches: ["main"]
    paths:
      - "server/internal/**"
      - "server/starter/**"
  workflow_dispatch:

jobs:
  go:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - server/internal
          - server/starter

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true

      - name: Download deps
        run: go mod download

      - name: gofmt check
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "Unformatted files:"
            echo "$files"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Link check
        run: go test ./... -run '^$'

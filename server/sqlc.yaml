version: "2"
sql:
  - engine: "postgresql"
    schema: "./migrations/scheme/sqlc.sql"
    queries: "./migrations/queries/queries.sql"
    gen:
      go:
        package: "dbsqlc"
        out: "./internal/infra/db/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        emit_json_tags: true
